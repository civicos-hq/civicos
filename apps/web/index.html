<!doctype html>
<!-- data-theme defaults to "dark" for no-JS visitors and gets rewritten
     by the inline bootstrap script below before first paint. Never
     unset — the CSS palette is scoped under [data-theme='…']. -->
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Adaptive theme-color — mobile browser chrome picks the right
         value based on OS preference. -->
    <meta name="theme-color" content="#f7f4ef" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0d0d0d" media="(prefers-color-scheme: dark)" />

    <!-- Theme bootstrap — runs SYNCHRONOUSLY before any CSS so the
         document paints in the correct mode from frame 1. Order of
         precedence: explicit user choice (localStorage) > OS preference
         > dark fallback (the site's original palette). Writes to
         <html data-theme="…"> which the stylesheet keys off of. -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('civicos-theme');
          var mode = saved && saved !== 'system' ? saved : null;
          if (!mode) {
            mode = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
          }
          document.documentElement.setAttribute('data-theme', mode);
        } catch (_) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>

    <!-- Primary meta tags. Title ~60 chars, description ~145 chars so
         the SERP snippet doesn't get truncated. -->
    <title>CivicOS — Open civic infrastructure for citizens and governments</title>
    <meta
      name="description"
      content="Open civic infrastructure for continuous participation between elections. Citizens, governments, universities, and NGOs on one public record."
    />
    <link rel="canonical" href="https://civicos.ng/" />

    <!-- Open Graph — WhatsApp, LinkedIn, Facebook, Slack, iMessage cards. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="CivicOS" />
    <meta
      property="og:title"
      content="CivicOS — Open civic infrastructure for citizens and governments"
    />
    <meta
      property="og:description"
      content="Open civic infrastructure for continuous participation between elections. Citizens, governments, universities, and NGOs on one public record."
    />
    <meta property="og:url" content="https://civicos.ng/" />
    <meta property="og:image" content="https://civicos.ng/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="CivicOS — An operating system for civic participation. Open civic infrastructure."
    />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter Card — summary_large_image gets the full 1200x630 hero. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta
      name="twitter:title"
      content="CivicOS — Open civic infrastructure for citizens and governments"
    />
    <meta
      name="twitter:description"
      content="Open civic infrastructure for continuous participation between elections. Citizens, governments, universities, and NGOs on one public record."
    />
    <meta name="twitter:image" content="https://civicos.ng/og-image.png" />
    <meta
      name="twitter:image:alt"
      content="CivicOS — An operating system for civic participation."
    />

    <link rel="icon" type="image/png" href="/civicos-mark.png" />
    <link rel="apple-touch-icon" href="/civicos-mark.png" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Structured data — Organization + WebSite. Helps Google render
         a knowledge-panel-style summary and eventually a Sitelinks
         Search Box under the CivicOS listing. `sameAs` cross-references
         our authoritative external presences. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@graph": [
          {
            "@type": "Organization",
            "@id": "https://civicos.ng/#organization",
            "name": "CivicOS",
            "url": "https://civicos.ng/",
            "logo": "https://civicos.ng/civicos-mark.png",
            "description": "Open civic infrastructure that lets citizens, governments, universities, NGOs, and communities build trusted civic experiences.",
            "sameAs": ["https://github.com/civicos-hq/civicos", "https://docs.civicos.ng/"]
          },
          {
            "@type": "WebSite",
            "@id": "https://civicos.ng/#website",
            "url": "https://civicos.ng/",
            "name": "CivicOS",
            "publisher": { "@id": "https://civicos.ng/#organization" },
            "inLanguage": "en-NG"
          }
        ]
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
