name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel in-flight runs on the same ref when a new commit lands. Saves
# minutes on force-pushes and stacked PRs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  # Skip Husky's git-hooks setup during CI installs — the `prepare: husky`
  # script would otherwise fail in the ephemeral CI checkout. Husky
  # honours this variable natively (v9+).
  HUSKY: '0'

jobs:
  # ── FRONTEND ─────────────────────────────────────────────────────────

  frontend-lint:
    name: Frontend · Lint
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint

  frontend-typecheck:
    name: Frontend · Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  frontend-build:
    name: Frontend · Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # Playwright's headless Chromium is fetched separately from
      # `pnpm install`. The web build's prerender pass (Vite build →
      # apps/web/scripts/prerender.mjs) launches it to snapshot `/`,
      # `/privacy`, and `/terms` into per-route HTML. Cache the browser
      # keyed on pnpm-lock.yaml so we only pay the ~30s download when
      # deps (which pin the Playwright version) actually change.
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: apps/web
        run: pnpm exec playwright install chromium

      - name: Build all Vite apps + shared packages
        run: pnpm build
        env:
          # Placeholder — real deployment sets this to the production gateway.
          VITE_API_URL: http://localhost:3000

  frontend-format:
    name: Frontend · Prettier check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check

  # ── BACKEND (Go) ─────────────────────────────────────────────────────

  go-vet:
    name: Go · Vet · ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 8
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - identity-service
          - community-service
          - organization-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # Pin to each service's own declared Go version — api-gateway
          # is on 1.25, the other services on 1.22.
          go-version-file: services/${{ matrix.service }}/go.mod
          cache-dependency-path: services/${{ matrix.service }}/go.sum
      - name: go mod download
        working-directory: services/${{ matrix.service }}
        run: go mod download
      - name: go vet ./...
        working-directory: services/${{ matrix.service }}
        run: go vet ./...

  go-fmt:
    name: Go · gofmt
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          # gofmt is stable enough that any recent Go works for the check.
          go-version: '1.22'
      - name: Verify all Go source is gofmt-clean
        run: |
          set -euo pipefail
          unformatted=$(gofmt -l services/)
          if [ -n "$unformatted" ]; then
            echo "The following Go files are not gofmt-clean:"
            echo "$unformatted"
            echo
            echo "Run 'gofmt -w services/' locally and re-commit."
            exit 1
          fi
          echo "All Go files are gofmt-clean."

  # ── DOCS ─────────────────────────────────────────────────────────────

  openapi-sync:
    name: Docs · OpenAPI mirror sync
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
      - name: Verify embedded gateway copies match docs/api
        # The api-gateway serves Swagger UI by `go:embed`-ing files from
        # services/api-gateway/internal/docs/openapi/. Because go:embed
        # can't reach outside the module root, we mirror instead of
        # symlink. Silent drift between the two paths is a real risk —
        # this job catches it. Local fix: `scripts/openapi-sync.sh`.
        run: scripts/openapi-sync.sh --check

  go-test:
    name: Go · Test · ${{ matrix.service }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        service:
          - api-gateway
          - identity-service
          - community-service
          - organization-service
    services:
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      nats:
        image: nats:2-alpine
        ports: ['4222:4222']
    env:
      # Petitions integration tests use embedded-postgres — no system
      # Postgres service needed. Ratelimit tests hit Redis; auth tests
      # need JWT_SECRET.
      REDIS_URL: redis://localhost:6379
      NATS_URL: nats://localhost:4222
      JWT_SECRET: test-secret-minimum-thirty-two-chars-long-x
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: services/${{ matrix.service }}/go.mod
          cache-dependency-path: services/${{ matrix.service }}/go.sum
      - name: go mod download
        working-directory: services/${{ matrix.service }}
        run: go mod download
      - name: go test
        working-directory: services/${{ matrix.service }}
        # -race: detect data races (important for concurrent handlers)
        # -shuffle=on: catch test-order dependencies
        run: go test -race -shuffle=on -timeout 5m ./...

  # ── Aggregate result ─────────────────────────────────────────────────
  # Single required status check for branch protection — one green tick
  # instead of nine separate ones. Set this as the required check on
  # protected branches and every job below it becomes gated.

  ci:
    name: CI
    if: always()
    runs-on: ubuntu-latest
    needs:
      - frontend-lint
      - frontend-typecheck
      - frontend-build
      - frontend-format
      - go-vet
      - go-fmt
      - go-test
      - openapi-sync
    steps:
      - name: All required jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] || \
             [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more required jobs did not succeed."
            exit 1
          fi
          echo "All required jobs succeeded."
