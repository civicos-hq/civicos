openapi: 3.0.3
info:
  title: CivicOS Organization Service
  version: 1.0.0
  description: |
    Organizations (registry + membership), announcements, projects, issue
    assignments ("receive reports"), and progress updates ("respond publicly",
    "update progress").

    All routes are proxied by the API gateway at `/api/v1/*`. The service
    itself mounts them under `/v1/*`.

    ## Authorization model

    Roles allowed to **create** a top-level org from scratch: `GOVERNMENT_ADMIN`,
    `PLATFORM_ADMIN`, `NGO`. Once created, the org's internal role
    (`OWNER` / `ADMIN` / `STAFF`) governs edits — not the platform JWT role.

    **Content-authorship writes are strictly org-only.** A `PLATFORM_ADMIN`
    who is not a member of the org **cannot** create, edit, publish, or
    delete announcements / projects / assignments / consultations on the
    org's behalf. Attribution belongs to the organization itself.

    Platform admins retain two narrow powers:

    - **Emergency close/archive** — `PLATFORM_ADMIN` can close a published
      consultation or archive an announcement without joining the org first.
      Written to the audit log with the actor's identity.
    - **Oversight reads** — `PLATFORM_ADMIN` can view responses, analytics,
      and org-only content (draft announcements, assignment inboxes) for
      any org.

    Anything beyond these two levers requires the platform admin to be
    added as a member of the target org first.

servers:
  - url: http://localhost:3000/api/v1
    description: Local (via API Gateway)
  - url: http://localhost:3003/v1
    description: Direct to organization-service

tags:
  - name: Organizations
    description: Registry and membership.
  - name: Members
    description: Organization member management.
  - name: Announcements
    description: Public announcements from an organization.
  - name: Projects
    description: Ongoing organization projects with status and budget.
  - name: Assignments
    description: Issue → organization assignments (an org takes responsibility for a report).
  - name: Progress Updates
    description: Public updates on an assigned issue or a project.
  - name: Consultations
    description: Structured feedback asks with a full lifecycle (DRAFT → PUBLISHED → CLOSED) and outcome publishing.
  - name: Consultation Questions
    description: Question builder for draft consultations (only editable while status = DRAFT).
  - name: Consultation Responses
    description: Verified-user response submission and admin-only response reads.
  - name: Consultation Outcomes
    description: Post-close outcome publishing — the "close the loop" primitive.

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ErrorResponse:
      type: object
      required: [success, code, message]
      properties:
        success: { type: boolean, example: false }
        code: { type: string, example: VALIDATION_ERROR }
        message: { type: string }

    OrgKind:
      type: string
      enum: [GOVERNMENT, AGENCY, NGO, UTILITY, OTHER]
    OrgJurisdiction:
      type: string
      enum: [NATIONAL, STATE, LGA, COMMUNITY]
    OrgMemberRole:
      type: string
      enum: [OWNER, ADMIN, STAFF]
    AnnouncementStatus:
      type: string
      enum: [DRAFT, PUBLISHED, ARCHIVED]
    ProjectStatus:
      type: string
      enum: [PLANNED, ACTIVE, PAUSED, COMPLETED, CANCELLED]
    AssignmentStatus:
      type: string
      enum: [RECEIVED, IN_PROGRESS, COMPLETED, REJECTED]

    Organization:
      type: object
      properties:
        id: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        kind: { $ref: '#/components/schemas/OrgKind' }
        jurisdiction: { $ref: '#/components/schemas/OrgJurisdiction' }
        state: { type: string, nullable: true }
        lga: { type: string, nullable: true }
        description: { type: string, nullable: true }
        logoUrl: { type: string, nullable: true }
        email: { type: string, nullable: true }
        phone: { type: string, nullable: true }
        website: { type: string, nullable: true }
        verified:
          {
            type: boolean,
            description: Citizen-facing trust badge; toggled by platform admins only.,
          }
        memberCount: { type: integer }
        announcementCount: { type: integer }
        projectCount: { type: integer }
        assignmentCount: { type: integer }
        createdById: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    OrgMember:
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        userName: { type: string }
        userRole: { type: string, description: Platform role at time of add. }
        role: { $ref: '#/components/schemas/OrgMemberRole' }
        joinedAt: { type: string, format: date-time }

    Announcement:
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        title: { type: string }
        body: { type: string }
        status: { $ref: '#/components/schemas/AnnouncementStatus' }
        publishedAt: { type: string, format: date-time, nullable: true }
        authorId: { type: string, format: uuid }
        authorName: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Project:
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        status: { $ref: '#/components/schemas/ProjectStatus' }
        startDate: { type: string, format: date-time, nullable: true }
        expectedEndDate: { type: string, format: date-time, nullable: true }
        budgetKobo:
          type: integer
          format: int64
          nullable: true
          description: Budget in kobo (₦1 = 100 kobo).
        communityId: { type: string, format: uuid, nullable: true }
        createdById: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    IssueAssignment:
      type: object
      description: Records that an org has taken responsibility for a community-service Issue.
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        issueId:
          {
            type: string,
            format: uuid,
            description: Bare UUID reference — no FK across service boundary.,
          }
        status: { $ref: '#/components/schemas/AssignmentStatus' }
        note: { type: string, nullable: true }
        assignedById: { type: string, format: uuid }
        assignedByName: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ProgressUpdate:
      type: object
      description: |
        The "respond publicly" primitive. Each update belongs to one org
        and points at either an Issue (an assigned report) or a Project.
        Public updates are readable by anyone; internal notes are
        member-only.
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        issueId: { type: string, format: uuid, nullable: true }
        projectId: { type: string, format: uuid, nullable: true }
        body: { type: string }
        isPublic: { type: boolean }
        authorId: { type: string, format: uuid }
        authorName: { type: string }
        createdAt: { type: string, format: date-time }

    ConsultationStatus:
      type: string
      enum: [DRAFT, PUBLISHED, CLOSED]

    QuestionType:
      type: string
      enum: [SHORT_TEXT, LONG_TEXT, SINGLE_CHOICE, MULTI_CHOICE, YES_NO]

    Consultation:
      type: object
      description: |
        A structured feedback ask published by an organization. `communityId`
        stored on the row is an audience label — it's shown to citizens but
        NOT enforced on response submission, so any verified user can answer.
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        communityId: { type: string, format: uuid, nullable: true }
        title: { type: string }
        summary: { type: string }
        description: { type: string, description: Markdown supported. }
        coverImageUrl: { type: string, nullable: true }
        status: { $ref: '#/components/schemas/ConsultationStatus' }
        opensAt: { type: string, format: date-time, nullable: true }
        closesAt: { type: string, format: date-time, nullable: true }
        responseCount: { type: integer }
        authorId: { type: string, format: uuid }
        authorName: { type: string }
        publishedAt: { type: string, format: date-time, nullable: true }
        closedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ConsultationQuestion:
      type: object
      properties:
        id: { type: string, format: uuid }
        consultationId: { type: string, format: uuid }
        position: { type: integer }
        prompt: { type: string }
        helpText: { type: string, nullable: true }
        type: { $ref: '#/components/schemas/QuestionType' }
        options:
          type: array
          items: { type: string }
          description: Only used by SINGLE_CHOICE and MULTI_CHOICE questions.
        required: { type: boolean }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ConsultationAnswer:
      type: object
      description: |
        A single question's answer inside a response. Exactly one of
        `textValue` or `selections` carries data based on question type.
        Yes/No answers are encoded as `selections: ["YES"]` or `["NO"]`.
      properties:
        id: { type: string, format: uuid }
        responseId: { type: string, format: uuid }
        questionId: { type: string, format: uuid }
        textValue: { type: string, nullable: true }
        selections:
          type: array
          items: { type: string }
          nullable: true

    ConsultationResponse:
      type: object
      properties:
        id: { type: string, format: uuid }
        consultationId: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        submittedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }

    ConsultationOutcome:
      type: object
      description: |
        The "close the loop" primitive — after a consultation closes,
        the org publishes a summary of findings and what happens next.
        Exactly one outcome per consultation; POSTing a second time
        replaces the previous.
      properties:
        id: { type: string, format: uuid }
        consultationId: { type: string, format: uuid }
        summary: { type: string }
        decisions: { type: string }
        nextSteps: { type: string }
        authorId: { type: string, format: uuid }
        authorName: { type: string }
        publishedAt: { type: string, format: date-time }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    ConsultationAggregate:
      type: object
      description: Per-question rollup returned by `/analytics`.
      properties:
        questionId: { type: string, format: uuid }
        prompt: { type: string }
        type: { $ref: '#/components/schemas/QuestionType' }
        answerCount: { type: integer }
        optionCounts:
          type: object
          additionalProperties: { type: integer }
          description: Populated for choice + Yes/No questions.
        textValues:
          type: array
          items: { type: string }
          description: Populated for text questions; capped at 100 samples.

paths:
  # ─────────────────────── ORGANIZATIONS ───────────────────────
  /organizations:
    get:
      tags: [Organizations]
      security: []
      summary: List organizations
      parameters:
        - in: query
          name: kind
          schema: { $ref: '#/components/schemas/OrgKind' }
        - in: query
          name: jurisdiction
          schema: { $ref: '#/components/schemas/OrgJurisdiction' }
        - in: query
          name: state
          schema: { type: string }
        - in: query
          name: lga
          schema: { type: string }
        - in: query
          name: q
          schema: { type: string }
      responses:
        '200':
          description: Organizations matching the filter.
          content:
            application/json:
              examples:
                default:
                  value:
                    success: true
                    data:
                      organizations:
                        - id: 9a8b7c6d-...
                          name: Enugu Water Corporation
                          slug: enugu-water-corp
                          kind: UTILITY
                          jurisdiction: STATE
                          state: Enugu
                          verified: true
                          memberCount: 12
                          projectCount: 4
                          assignmentCount: 27
                          createdById: 3f1a...
                          createdAt: 2026-06-01T09:00:00Z
                          updatedAt: 2026-06-01T09:00:00Z
    # No direct POST — organizations are only minted by approving an
    # `OrganizationApplication` in identity-service (see the applications
    # endpoints). Admins and org owners can still PATCH via
    # `/organizations/{id}` to fix data.

  /organizations/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Organizations]
      security: []
      summary: Get an organization
      responses:
        '200': { description: Organization detail. }
        '404':
          description: Not found.
          content:
            application/json:
              examples:
                default:
                  {
                    value: { success: false, code: ORG_NOT_FOUND, message: Organization not found },
                  }
    patch:
      tags: [Organizations]
      summary: Update an organization (org admin or PLATFORM_ADMIN)
      description: |
        All fields are optional. Toggling `verified` writes a distinct
        `org.verified` / `org.unverified` audit entry (separate from the
        plain `org.updated` action) because the verified badge is a
        citizen-facing trust signal.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                kind: { $ref: '#/components/schemas/OrgKind' }
                jurisdiction: { $ref: '#/components/schemas/OrgJurisdiction' }
                state: { type: string, nullable: true }
                lga: { type: string, nullable: true }
                description: { type: string, nullable: true }
                logoUrl: { type: string, nullable: true }
                email: { type: string, format: email, nullable: true }
                phone: { type: string, nullable: true }
                website: { type: string, format: uri, nullable: true }
                verified:
                  type: boolean
                  description: Platform admins only.
      responses:
        '200': { description: Updated organization. }

  # ────────────────────────── MEMBERS ──────────────────────────
  /organizations/{id}/members:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Members]
      security: []
      summary: List organization members
      responses:
        '200':
          description: Members.
          content:
            application/json:
              examples:
                default:
                  value:
                    success: true
                    data:
                      members:
                        - id: m1a2b3c4-...
                          organizationId: 9a8b7c6d-...
                          userId: 3f1a...
                          userName: Ada Nnamdi
                          userRole: NGO
                          role: OWNER
                          joinedAt: 2026-06-01T09:00:00Z
    post:
      tags: [Members]
      summary: Add a member (org admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [userId, userName, userRole, role]
              properties:
                userId: { type: string, format: uuid }
                userName: { type: string }
                userRole: { type: string, description: Platform role at time of add. }
                role: { $ref: '#/components/schemas/OrgMemberRole' }
            examples:
              default:
                { value: { userId: 3f1a..., userName: Ada Nnamdi, userRole: NGO, role: ADMIN } }
      responses:
        '201': { description: Member added; audit-logged. }

  /organizations/{id}/members/{userId}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
      - in: path
        name: userId
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Members]
      summary: Change a member's role (org admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role: { $ref: '#/components/schemas/OrgMemberRole' }
      responses:
        '200': { description: Role updated; audit-logged. }
    delete:
      tags: [Members]
      summary: Remove a member (org admin)
      responses:
        '200': { description: Member removed; audit-logged. }

  # ─────────────────────── ANNOUNCEMENTS ───────────────────────
  /announcements:
    get:
      tags: [Announcements]
      security: []
      summary: Global feed of published announcements
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 20, maximum: 100 }
      responses:
        '200':
          description: Announcements, newest first.
          content:
            application/json:
              examples:
                default:
                  value:
                    success: true
                    data:
                      announcements:
                        - id: a1b2c3d4-...
                          organizationId: 9a8b7c6d-...
                          title: Water supply resumes on Abakpa Rd
                          body: The burst pipe was repaired overnight.
                          status: PUBLISHED
                          publishedAt: 2026-07-09T08:00:00Z
                          authorId: 3f1a...
                          authorName: Enugu Water Corp
                          createdAt: 2026-07-09T07:45:00Z
                          updatedAt: 2026-07-09T08:00:00Z

  /organizations/{id}/announcements:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Announcements]
      summary: List an organization's announcements
      description: Non-members see only published; org members also see drafts.
      responses:
        '200': { description: Announcements. }
    post:
      tags: [Announcements]
      summary: Create an announcement (org admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, body]
              properties:
                title: { type: string, minLength: 2 }
                body: { type: string, minLength: 10 }
                publish:
                  type: boolean
                  description: Publish immediately instead of leaving as DRAFT.
            examples:
              default:
                {
                  value:
                    {
                      title: Water restored,
                      body: The burst pipe on Abakpa Rd was repaired overnight.,
                      publish: true,
                    },
                }
      responses:
        '201': { description: Announcement created. }

  /announcements/{announcementId}:
    parameters:
      - in: path
        name: announcementId
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Announcements]
      security: []
      summary: Get an announcement
      responses:
        '200': { description: Announcement detail. }
        '404': { description: Not found. }
    patch:
      tags: [Announcements]
      summary: Update an announcement (org admin)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                body: { type: string }
      responses:
        '200': { description: Updated announcement. }
    delete:
      tags: [Announcements]
      summary: Delete an announcement (org admin)
      responses:
        '200': { description: Deleted; audit-logged. }

  /announcements/{announcementId}/publish:
    parameters:
      - in: path
        name: announcementId
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Announcements]
      summary: Publish an announcement (org admin)
      responses:
        '200': { description: Published; audit-logged. }

  /announcements/{announcementId}/archive:
    parameters:
      - in: path
        name: announcementId
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Announcements]
      summary: Archive an announcement (org admin OR platform admin)
      description: |
        Emergency lever — same rationale as consultation close.
        `PLATFORM_ADMIN` can archive without joining the org first;
        every other announcement write is strictly org-only.
      responses:
        '200': { description: Archived; audit-logged. }

  # ──────────────────────────── PROJECTS ────────────────────────────
  /projects:
    get:
      tags: [Projects]
      security: []
      summary: List projects
      parameters:
        - in: query
          name: organizationId
          schema: { type: string, format: uuid }
        - in: query
          name: communityId
          schema: { type: string, format: uuid }
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/ProjectStatus' }
      responses:
        '200': { description: Projects. }

  /organizations/{id}/projects:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Projects]
      security: []
      summary: List projects owned by an organization
      parameters:
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/ProjectStatus' }
      responses:
        '200': { description: Projects. }
    post:
      tags: [Projects]
      summary: Create a project (org admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, description]
              properties:
                title: { type: string, minLength: 2 }
                description: { type: string, minLength: 10 }
                status: { $ref: '#/components/schemas/ProjectStatus' }
                startDate: { type: string, format: date-time, nullable: true }
                expectedEndDate: { type: string, format: date-time, nullable: true }
                budgetKobo: { type: integer, format: int64, nullable: true }
                communityId: { type: string, format: uuid, nullable: true }
            examples:
              default:
                value:
                  title: Replace Junction 4 water main
                  description: Full replacement of 800m of pipeline, from Junction 4 to the reservoir.
                  status: ACTIVE
                  startDate: 2026-07-15T00:00:00Z
                  expectedEndDate: 2026-09-30T00:00:00Z
                  budgetKobo: 42000000
                  communityId: 6f2a1c4d-...
      responses:
        '201': { description: Project created. }

  /projects/{projectId}:
    parameters:
      - in: path
        name: projectId
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Projects]
      security: []
      summary: Get a project
      responses:
        '200': { description: Project detail. }
        '404':
          description: Not found.
          content:
            application/json:
              examples:
                default:
                  { value: { success: false, code: PROJECT_NOT_FOUND, message: Project not found } }
    patch:
      tags: [Projects]
      summary: Update a project (org admin)
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                description: { type: string }
                status: { $ref: '#/components/schemas/ProjectStatus' }
                startDate: { type: string, format: date-time, nullable: true }
                expectedEndDate: { type: string, format: date-time, nullable: true }
                budgetKobo: { type: integer, format: int64, nullable: true }
                communityId: { type: string, format: uuid, nullable: true }
      responses:
        '200': { description: Updated project. }
    delete:
      tags: [Projects]
      summary: Delete a project (org admin)
      responses:
        '200': { description: Deleted. }

  # ─────────────────────── ASSIGNMENTS ───────────────────────
  /organizations/{id}/assignments:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Assignments]
      summary: List an organization's issue assignments (members only)
      description: Members-only to prevent a curious user from enumerating another org's inbox.
      parameters:
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/AssignmentStatus' }
      responses:
        '200': { description: Assignments. }
    post:
      tags: [Assignments]
      summary: Claim an issue for an organization (org admin or PLATFORM_ADMIN)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [issueId]
              properties:
                issueId: { type: string, format: uuid }
                note: { type: string, nullable: true }
            examples:
              default:
                {
                  value:
                    {
                      issueId: 7f8e9d0c-1234-5678-9abc-def012345678,
                      note: We've dispatched a team to Junction 4.,
                    },
                }
      responses:
        '201': { description: Assignment created. }

  /issues/{issueId}/assignments:
    parameters:
      - in: path
        name: issueId
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Assignments]
      security: []
      summary: Which orgs have claimed this issue
      description: Public read — anyone viewing an issue should see who's responsible.
      responses:
        '200': { description: Assignments. }

  /assignments/{assignmentId}:
    parameters:
      - in: path
        name: assignmentId
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Assignments]
      summary: Update assignment status (org admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status: { $ref: '#/components/schemas/AssignmentStatus' }
                note: { type: string, nullable: true }
            examples:
              default: { value: { status: IN_PROGRESS, note: Team on site since 8am. } }
      responses:
        '200': { description: Updated assignment. }
    delete:
      tags: [Assignments]
      summary: Remove an assignment (org admin)
      responses:
        '200': { description: Removed. }

  # ─────────────────── PROGRESS UPDATES ───────────────────
  /issues/{issueId}/progress-updates:
    parameters:
      - in: path
        name: issueId
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Progress Updates]
      security: []
      summary: List public progress updates for an issue
      responses:
        '200':
          description: Progress updates.
          content:
            application/json:
              examples:
                default:
                  value:
                    success: true
                    data:
                      updates:
                        - id: p1u2p3d4-...
                          organizationId: 9a8b7c6d-...
                          issueId: 7f8e9d0c-...
                          body: Repairs completed. Water pressure restored.
                          isPublic: true
                          authorId: 3f1a...
                          authorName: Enugu Water Corp
                          createdAt: 2026-07-09T08:00:00Z

  /projects/{projectId}/progress-updates:
    parameters:
      - in: path
        name: projectId
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Progress Updates]
      security: []
      summary: List public progress updates for a project
      responses:
        '200': { description: Progress updates. }

  /organizations/{id}/progress-updates:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Progress Updates]
      summary: Post a progress update (org admin)
      description: Exactly one of `issueId` or `projectId` must be set — an update always hangs off either an assigned report or a project.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [body]
              properties:
                issueId: { type: string, format: uuid, nullable: true }
                projectId: { type: string, format: uuid, nullable: true }
                body: { type: string, minLength: 2 }
                isPublic: { type: boolean, default: true }
            examples:
              onIssue: { value: { issueId: 7f8e9d0c-..., body: Team dispatched, ETA 30 minutes. } }
              onProject:
                {
                  value:
                    { projectId: proj1a2b-..., body: Phase 1 complete — 400m of pipeline laid. },
                }
      responses:
        '201': { description: Update posted. }
        '400':
          description: Neither or both of issueId/projectId set.
          content:
            application/json:
              examples:
                default:
                  {
                    value:
                      {
                        success: false,
                        code: INVALID_TARGET,
                        message: Set exactly one of issueId or projectId,
                      },
                  }

  /progress-updates/{updateId}:
    parameters:
      - in: path
        name: updateId
        required: true
        schema: { type: string, format: uuid }
    delete:
      tags: [Progress Updates]
      summary: Delete a progress update (org admin)
      responses:
        '200': { description: Deleted. }
        '404':
          description: Not found.
          content:
            application/json:
              examples:
                default:
                  {
                    value:
                      {
                        success: false,
                        code: UPDATE_NOT_FOUND,
                        message: Progress update not found,
                      },
                  }

  # ─────────────────────── CONSULTATIONS ────────────────────────
  /consultations:
    get:
      tags: [Consultations]
      security: []
      summary: List consultations
      description: |
        Public list. Filter by organization, community, or status. Drafts
        are visible via the API but the citizen frontend hides them from
        non-members.
      parameters:
        - in: query
          name: organizationId
          schema: { type: string, format: uuid }
        - in: query
          name: communityId
          schema: { type: string, format: uuid }
        - in: query
          name: status
          schema: { $ref: '#/components/schemas/ConsultationStatus' }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: List of consultations.
          content:
            application/json:
              examples:
                default:
                  value:
                    success: true
                    data:
                      consultations:
                        - id: c1a2b3c4-5678-90ab-cdef-1234567890ab
                          organizationId: 9a8b7c6d-1111-2222-3333-444455556666
                          communityId: 6f2a1c4d-9b3e-4a1f-8c7d-2b3e4f5a6b7c
                          title: National Curriculum Review
                          summary: How should the syllabus change for 2027?
                          description: Full context in markdown.
                          status: PUBLISHED
                          responseCount: 142
                          authorId: 3f1a...
                          authorName: Ada Admin
                          publishedAt: 2026-07-09T10:00:00Z
                          createdAt: 2026-07-08T14:22:00Z
                          updatedAt: 2026-07-09T10:00:00Z

  /consultations/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Consultations]
      security: []
      summary: Get a consultation by ID
      responses:
        '200':
          description: Consultation detail.
        '404':
          description: Not found.
          content:
            application/json:
              examples:
                default:
                  {
                    value:
                      {
                        success: false,
                        code: CONSULTATION_NOT_FOUND,
                        message: Consultation not found,
                      },
                  }
    patch:
      tags: [Consultations]
      summary: Edit a draft consultation (org admin)
      description: |
        Edits are DRAFT-only. Once published, the record is frozen so
        earlier and later responders answer the same questions.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string, minLength: 5, maxLength: 200 }
                summary: { type: string, minLength: 10, maxLength: 500 }
                description: { type: string, minLength: 10 }
                coverImageUrl: { type: string, nullable: true }
                communityId: { type: string, format: uuid, nullable: true }
                opensAt: { type: string, format: date-time, nullable: true }
                closesAt: { type: string, format: date-time, nullable: true }
      responses:
        '200': { description: Updated. }
        '409':
          description: Not a draft.
          content:
            application/json:
              examples:
                default:
                  { value: { success: false, code: NOT_DRAFT, message: Only drafts can be edited } }
    delete:
      tags: [Consultations]
      summary: Delete a draft consultation (org admin)
      description: DRAFT-only. Once published, the record must survive.
      responses:
        '200': { description: Deleted. }
        '409': { description: Not a draft. }

  /organizations/{id}/consultations:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Consultations]
      summary: Create a new consultation as DRAFT (org admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title, summary, description]
              properties:
                title: { type: string, minLength: 5, maxLength: 200 }
                summary: { type: string, minLength: 10, maxLength: 500 }
                description: { type: string, minLength: 10 }
                coverImageUrl: { type: string, nullable: true }
                communityId: { type: string, format: uuid, nullable: true }
                opensAt: { type: string, format: date-time, nullable: true }
                closesAt: { type: string, format: date-time, nullable: true }
            examples:
              default:
                value:
                  title: National Curriculum Review
                  summary: How should the syllabus change for 2027?
                  description: We are collecting citizen input.
                  communityId: 6f2a1c4d-9b3e-4a1f-8c7d-2b3e4f5a6b7c
                  closesAt: 2026-09-30T23:59:59Z
      responses:
        '201':
          description: Created; status = DRAFT.

  /consultations/{id}/publish:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Consultations]
      summary: Publish a draft consultation (org admin)
      description: DRAFT → PUBLISHED. Rejects if the consultation has no questions.
      responses:
        '200':
          description: Published; org members notified.
        '400':
          description: No questions yet.
          content:
            application/json:
              examples:
                default:
                  {
                    value:
                      {
                        success: false,
                        code: NO_QUESTIONS,
                        message: Add at least one question before publishing,
                      },
                  }
        '409':
          description: Invalid transition.

  /consultations/{id}/close:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Consultations]
      summary: Close a published consultation (org admin OR platform admin)
      description: |
        PUBLISHED → CLOSED. Idempotent — closing a closed consultation is
        a no-op. Responders are notified so they can watch for the outcome.

        **Emergency lever.** This is the one consultation-lifecycle endpoint
        that a `PLATFORM_ADMIN` can invoke without being a member of the
        org. Every other write (create, edit, publish, delete, outcome) is
        strictly org-only. Platform-admin closes write an audit entry with
        the actor's identity.
      responses:
        '200': { description: Closed. }
        '409': { description: Invalid transition. }

  # ────────────────── CONSULTATION QUESTIONS ─────────────────
  /consultations/{id}/questions:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Consultation Questions]
      security: []
      summary: List questions in order
      responses:
        '200':
          description: Questions.
          content:
            application/json:
              examples:
                default:
                  value:
                    success: true
                    data:
                      questions:
                        - id: q1a2b3c4-...
                          consultationId: c1a2b3c4-...
                          position: 1
                          prompt: Which subjects deserve more focus?
                          type: MULTI_CHOICE
                          options: [Maths, Science, History, Civic Ed]
                          required: true
    post:
      tags: [Consultation Questions]
      summary: Add a question to a draft (org admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt, type]
              properties:
                prompt: { type: string, minLength: 3, maxLength: 500 }
                helpText: { type: string, nullable: true }
                type: { $ref: '#/components/schemas/QuestionType' }
                options:
                  type: array
                  items: { type: string }
                  description: Required for SINGLE_CHOICE and MULTI_CHOICE (min 2 items).
                required: { type: boolean, default: false }
                position: { type: integer, description: Omit to append at the end. }
      responses:
        '201': { description: Question created. }
        '400':
          description: Invalid type or missing options.
          content:
            application/json:
              examples:
                needsOptions:
                  {
                    value:
                      {
                        success: false,
                        code: OPTIONS_REQUIRED,
                        message: Choice questions need at least two options,
                      },
                  }

  /consultations/{id}/questions/reorder:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Consultation Questions]
      summary: Bulk-reorder questions (org admin, DRAFT only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [ordering]
              properties:
                ordering:
                  type: object
                  additionalProperties: { type: integer }
                  description: Map of questionId → new zero-based position.
            examples:
              default:
                value:
                  ordering:
                    q1a2b3c4-...: 0
                    q5f6e7d8-...: 1
                    q9c8b7a6-...: 2
      responses:
        '200': { description: Reordered. }

  /consultation-questions/{questionId}:
    parameters:
      - in: path
        name: questionId
        required: true
        schema: { type: string, format: uuid }
    patch:
      tags: [Consultation Questions]
      summary: Update a question (org admin, DRAFT only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [prompt, type]
              properties:
                prompt: { type: string, minLength: 3, maxLength: 500 }
                helpText: { type: string, nullable: true }
                type: { $ref: '#/components/schemas/QuestionType' }
                options:
                  type: array
                  items: { type: string }
                required: { type: boolean }
                position: { type: integer }
      responses:
        '200': { description: Updated. }
    delete:
      tags: [Consultation Questions]
      summary: Delete a question (org admin, DRAFT only)
      responses:
        '200': { description: Deleted. }

  # ────────────────── CONSULTATION RESPONSES ─────────────────
  /consultations/{id}/responses:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Consultation Responses]
      summary: Submit a response (verified user)
      description: |
        One response per user is enforced by a compound unique index on
        `(consultation_id, user_id)`. Community-scoped consultations do
        NOT gate submission — any verified user can respond regardless
        of community membership. The community label is informational.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [answers]
              properties:
                answers:
                  type: array
                  minItems: 1
                  items:
                    type: object
                    required: [questionId]
                    properties:
                      questionId: { type: string, format: uuid }
                      textValue:
                        type: string
                        nullable: true
                        description: For SHORT_TEXT and LONG_TEXT questions.
                      selections:
                        type: array
                        items: { type: string }
                        description: For SINGLE_CHOICE, MULTI_CHOICE, YES_NO questions. Yes/No is encoded as ["YES"] or ["NO"].
            examples:
              default:
                value:
                  answers:
                    - questionId: q1a2b3c4-...
                      selections: [YES]
                    - questionId: q2a2b3c4-...
                      selections: [Civic Ed, Science]
                    - questionId: q3a2b3c4-...
                      textValue: We should teach civics from primary school.
      responses:
        '201':
          description: Response recorded.
        '409':
          description: Consultation not accepting responses, closed, or already responded.
          content:
            application/json:
              examples:
                alreadyResponded:
                  {
                    value:
                      {
                        success: false,
                        code: ALREADY_RESPONDED,
                        message: You've already responded to this consultation,
                      },
                  }
                notAccepting:
                  {
                    value:
                      {
                        success: false,
                        code: NOT_ACCEPTING_RESPONSES,
                        message: This consultation isn't accepting responses,
                      },
                  }
                pastDeadline:
                  {
                    value:
                      { success: false, code: PAST_DEADLINE, message: Response window has closed },
                  }
        '400':
          description: Missing required answer, unknown question, or unknown option.
          content:
            application/json:
              examples:
                requiredUnanswered:
                  {
                    value:
                      {
                        success: false,
                        code: REQUIRED_UNANSWERED,
                        message: One or more required questions were not answered,
                      },
                  }
                unknownOption:
                  {
                    value:
                      {
                        success: false,
                        code: UNKNOWN_OPTION,
                        message: Selected option is not on the question,
                      },
                  }
    get:
      tags: [Consultation Responses]
      summary: List submitted responses (org admin)
      description: Members-only. Returns each response with its answers grouped.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, default: 50 }
        - in: query
          name: offset
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: Responses.

  /consultations/{id}/analytics:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Consultation Responses]
      summary: Per-question aggregated analytics (org admin)
      description: |
        For choice questions returns option-count histograms. For text
        questions returns up to 100 sample text values. Large consultations
        will get a proper SQL rollup in a future revision.
      responses:
        '200':
          description: Aggregates.
          content:
            application/json:
              examples:
                default:
                  value:
                    success: true
                    data:
                      consultation:
                        id: c1a2b3c4-...
                        title: National Curriculum Review
                        status: CLOSED
                      responseCount: 142
                      questions:
                        - questionId: q1a2b3c4-...
                          prompt: Do you agree with the current syllabus?
                          type: YES_NO
                          answerCount: 142
                          optionCounts: { YES: 47, NO: 95 }
                        - questionId: q2a2b3c4-...
                          prompt: Which subjects deserve more focus?
                          type: MULTI_CHOICE
                          answerCount: 142
                          optionCounts: { Civic Ed: 88, Science: 62, Maths: 51, History: 22 }

  /me/consultations/responses:
    get:
      tags: [Consultation Responses]
      summary: Which consultations has the caller responded to
      description: |
        Returned so the citizen frontend can mark "you've participated"
        in list views and prevent double-answer attempts before the
        server round-trip.
      responses:
        '200':
          description: List of consultation IDs the caller has responded to.
          content:
            application/json:
              examples:
                default:
                  value:
                    success: true
                    data:
                      consultationIds: [c1a2b3c4-..., c9a8b7c6-...]

  # ────────────────── CONSULTATION OUTCOMES ─────────────────
  /consultations/{id}/outcome:
    parameters:
      - in: path
        name: id
        required: true
        schema: { type: string, format: uuid }
    get:
      tags: [Consultation Outcomes]
      security: []
      summary: Get the published outcome
      responses:
        '200': { description: Outcome. }
        '404':
          description: No outcome has been published yet.
          content:
            application/json:
              examples:
                default:
                  {
                    value:
                      {
                        success: false,
                        code: OUTCOME_NOT_FOUND,
                        message: No outcome has been published yet,
                      },
                  }
    post:
      tags: [Consultation Outcomes]
      summary: Publish or update the outcome (org admin, CLOSED only)
      description: |
        The "close the loop" primitive. Requires the consultation to be
        CLOSED. Idempotent — POSTing again overwrites the previous
        outcome. Every responder is notified when the outcome is
        published.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [summary, decisions, nextSteps]
              properties:
                summary: { type: string, minLength: 10 }
                decisions: { type: string, minLength: 10 }
                nextSteps: { type: string, minLength: 10 }
            examples:
              default:
                value:
                  summary: The community wants more civic education.
                  decisions: We will introduce weekly civic ed classes for grades 4-9.
                  nextSteps: Rollout begins Q3 2027 with a teacher training programme in Q2.
      responses:
        '201':
          description: Outcome published; responders notified.
        '409':
          description: Consultation isn't closed yet.
          content:
            application/json:
              examples:
                default:
                  {
                    value:
                      {
                        success: false,
                        code: NOT_CLOSED,
                        message: Close the consultation before publishing an outcome,
                      },
                  }
