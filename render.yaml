# CivicOS deployment blueprint — Render Infrastructure-as-Code
# Docs: https://render.com/docs/blueprint-spec
#
# ── FREE-TIER VALIDATION TOPOLOGY ────────────────────────────────────
# Render's free instance type does NOT cover private services (pserv),
# and free web services cannot RECEIVE private-network traffic. So for
# a $0 validation deploy, the three internal services run as *public*
# free web services and the gateway calls them over their public
# onrender.com URLs. This is acceptable because every service enforces
# JWT auth itself — the gateway is a convenience layer, not the only
# defence. Free-tier caveats:
#   • services spin down after 15 min idle (~1 min cold start, chained)
#   • outbound SMTP ports are blocked — emails fall back to the console
#     mailer (verification links print to civicos-identity's logs)
#   • Postgres free expires 30 days after creation (14-day grace)
#   • uploads are ephemeral (no disk on free instances)
#
# ── PRODUCTION TOPOLOGY (~$28–35/mo) ─────────────────────────────────
# Before real traffic, switch the three internal services back to:
#     type: pserv          (drops them off the public internet)
#     plan: starter        ($7/mo each)
# and change the gateway's *_SERVICE_URL references to
#     fromService: { type: pserv, name: ..., property: hostport }
# Also: postgres plan → basic-256mb, re-add the uploads disk on
# civicos-community, and set SMTP secrets (paid instances can send
# SMTP). The gateway's ensureScheme() handles both URL shapes.
#
# What this provisions when applied:
#   • 1 managed PostgreSQL 16 database
#   • 1 managed Redis (Render "Key Value") — rate limits + SSE fan-out
#   • 4 web services (api-gateway + 3 internal, all free tier)
#   • 2 static sites (citizen web, admin console)
#
# On first `render blueprint launch`, Render creates all resources and
# wires the connectionStrings + service URLs automatically via the
# `fromDatabase` / `fromService` references below. Subsequent pushes to
# `main` auto-deploy each changed service.

databases:
  - name: civicos-postgres
    databaseName: civicos
    user: civicos
    plan: free # expires 30 days after creation; upgrade to basic-256mb before then
    postgresMajorVersion: '16'
    ipAllowList: [] # empty = private; only Render services can connect

envVarGroups:
  # Shared secrets referenced by every backend service via `fromGroup`.
  # SMTP fields ship blank — the identity service falls back to its
  # console mailer (links print to logs). NOTE: free instances block
  # outbound SMTP ports entirely; setting these only takes effect once
  # civicos-identity is on a paid plan.
  - name: civicos-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true # Render mints a 32-byte random on first apply
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: '587'
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: 'CivicOS <no-reply@civicos.example>'

services:
  # ── Managed Redis (Render "Key Value") ─────────────────────────────
  - type: keyvalue
    name: civicos-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  # ── Public API gateway ─────────────────────────────────────────────
  # Every citizen and admin request lands here first. Auto-deploys on
  # push to main. The *_SERVICE_URL values are bare public hostnames
  # (fromService.host) — the gateway prepends https:// itself.
  - type: web
    name: civicos-gateway
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./services/api-gateway/Dockerfile
    dockerContext: ./services/api-gateway
    healthCheckPath: /health
    envVars:
      - fromGroup: civicos-secrets
      # Pinned public URLs. `fromService.host` resolves to the short
      # private-network hostname (e.g. "civicos-identity-kwrn"), which is
      # unreachable on the free tier — free services can't RECEIVE
      # private-network traffic. The onrender.com suffix is stable for
      # the life of each service; update these if a service is recreated.
      - key: IDENTITY_SERVICE_URL
        value: https://civicos-identity-kwrn.onrender.com
      - key: COMMUNITY_SERVICE_URL
        value: https://civicos-community-0otl.onrender.com
      - key: ORGANIZATION_SERVICE_URL
        value: https://civicos-organization-vnsb.onrender.com
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: civicos-redis
          property: connectionString

  # ── Identity service ───────────────────────────────────────────────
  # Handles auth, users, sessions, admin metrics. Sends verification +
  # password-reset emails via SMTP (console mailer on free tier).
  # Public on free tier (see header) — enforces JWT on its own routes.
  - type: web
    name: civicos-identity
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./services/identity-service/Dockerfile
    dockerContext: ./services/identity-service
    healthCheckPath: /health
    envVars:
      - fromGroup: civicos-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: civicos-postgres
          property: connectionString
      - key: APP_URL
        # The citizen web custom domain — used in the body of
        # verification emails.
        value: https://civicos.ng

  # ── Community service ──────────────────────────────────────────────
  # Communities, issues, petitions, representatives, comments,
  # notifications, content flags.
  # NOTE: persistent disk removed for free-tier deploy — uploads will
  # not survive service restarts. Re-add the `disk:` block before
  # taking real citizen traffic:
  #     disk:
  #       name: uploads
  #       mountPath: /data
  #       sizeGB: 10
  - type: web
    name: civicos-community
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./services/community-service/Dockerfile
    dockerContext: ./services/community-service
    healthCheckPath: /health
    envVars:
      - fromGroup: civicos-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: civicos-postgres
          property: connectionString

  # ── Organization service ───────────────────────────────────────────
  # Organizations, members, announcements, projects, assignments,
  # progress updates, verified-badge control.
  - type: web
    name: civicos-organization
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./services/organization-service/Dockerfile
    dockerContext: ./services/organization-service
    healthCheckPath: /health
    envVars:
      - fromGroup: civicos-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: civicos-postgres
          property: connectionString

  # ── Citizen web (static site) ──────────────────────────────────────
  # Built by turbo which builds shared packages first, then the app.
  # SPA rewrites all unmatched paths to index.html so React Router
  # handles /issues, /petitions, etc.
  - type: web
    name: civicos-web
    runtime: static
    branch: main
    # `corepack pnpm` runs the packageManager-pinned pnpm (9.4.0) without
    # `corepack enable`, which fails on Render's read-only /usr/bin.
    # COREPACK_ENABLE_DOWNLOAD_PROMPT=0 skips the interactive download
    # confirmation, which would hang a non-TTY CI build.
    buildCommand: export COREPACK_ENABLE_DOWNLOAD_PROMPT=0 && corepack pnpm install --frozen-lockfile && corepack pnpm --filter @civicos/web... build
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        # The gateway's public URL, pinned (see note on the gateway's
        # *_SERVICE_URL vars).
        value: https://civicos-gateway-8slr.onrender.com
      - key: HUSKY
        value: '0' # skip Husky's git-hooks step during the CI install

  # ── Admin console (static site) ────────────────────────────────────
  - type: web
    name: civicos-admin
    runtime: static
    branch: main
    buildCommand: export COREPACK_ENABLE_DOWNLOAD_PROMPT=0 && corepack pnpm install --frozen-lockfile && corepack pnpm --filter @civicos/admin... build
    staticPublishPath: ./apps/admin/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://civicos-gateway-8slr.onrender.com
      - key: HUSKY
        value: '0'
