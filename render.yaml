# CivicOS deployment blueprint — Render Infrastructure-as-Code
# Docs: https://render.com/docs/blueprint-spec
#
# ── HYBRID PRODUCTION TOPOLOGY (~$27/mo) ─────────────────────────────
# The three internal services run as *paid* (starter) web services and
# the gateway reaches them over Render's private network via
# `fromService.hostport` (e.g. "civicos-identity-kwrn:10000"). We tried
# the all-free topology first (public onrender.com URLs between
# services); it fails in production because Render's Cloudflare-fronted
# edge intermittently 429s the gateway's shared egress IP. Private-
# network traffic never touches that edge. Paid instances also never
# spin down and may send SMTP.
#
# The internal services stay `type: web` rather than `pserv` because a
# service's type is immutable on Render — converting means delete +
# recreate (new hostnames, re-wiring). They remain publicly reachable
# on their onrender.com URLs but every route enforces JWT itself.
# Remaining free-tier surfaces: the gateway (public entry, spins down
# after 15 min idle) and the static sites (always free).
#
# Uploads on civicos-community are still ephemeral. Before accepting
# real citizen photos, add:
#     disk:
#       name: uploads
#       mountPath: /data
#       sizeGB: 10
#
# What this provisions when applied:
#   • 1 managed PostgreSQL 16 database (basic-256mb)
#   • 1 managed Redis (Render "Key Value") — rate limits + SSE fan-out
#   • 4 web services (free api-gateway + 3 starter internal)
#   • 2 static sites (citizen web, admin console)
#
# On first `render blueprint launch`, Render creates all resources and
# wires the connectionStrings + service URLs automatically via the
# `fromDatabase` / `fromService` references below. Subsequent pushes to
# `main` auto-deploy each changed service.

databases:
  - name: civicos-postgres
    databaseName: civicos
    user: civicos
    plan: basic-256mb
    postgresMajorVersion: '16'
    ipAllowList: [] # empty = private; only Render services can connect

envVarGroups:
  # Shared secrets referenced by every backend service via `fromGroup`.
  # SMTP fields ship blank — the identity service falls back to its
  # console mailer (links print to logs). NOTE: free instances block
  # outbound SMTP ports entirely; setting these only takes effect once
  # civicos-identity is on a paid plan.
  - name: civicos-secrets
    envVars:
      - key: JWT_SECRET
        generateValue: true # Render mints a 32-byte random on first apply
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: '587'
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM
        value: 'CivicOS <no-reply@civicos.example>'

services:
  # ── Managed Redis (Render "Key Value") ─────────────────────────────
  - type: keyvalue
    name: civicos-redis
    plan: free
    ipAllowList: []
    maxmemoryPolicy: allkeys-lru

  # ── Public API gateway ─────────────────────────────────────────────
  # Every citizen and admin request lands here first. Auto-deploys on
  # push to main.
  - type: web
    name: civicos-gateway
    runtime: docker
    plan: free
    branch: main
    dockerfilePath: ./services/api-gateway/Dockerfile
    dockerContext: ./services/api-gateway
    healthCheckPath: /health
    envVars:
      - fromGroup: civicos-secrets
      # Private-network addresses ("host:port") — paid services can
      # receive private traffic, so gateway→backend calls skip Render's
      # public edge entirely. ensureScheme() turns these into http://.
      - key: IDENTITY_SERVICE_URL
        fromService:
          type: web
          name: civicos-identity
          property: hostport
      - key: COMMUNITY_SERVICE_URL
        fromService:
          type: web
          name: civicos-community
          property: hostport
      - key: ORGANIZATION_SERVICE_URL
        fromService:
          type: web
          name: civicos-organization
          property: hostport
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: civicos-redis
          property: connectionString

  # ── Identity service ───────────────────────────────────────────────
  # Handles auth, users, sessions, admin metrics. Sends verification +
  # password-reset emails via SMTP once the civicos-secrets SMTP vars
  # are filled in (console mailer until then).
  - type: web
    name: civicos-identity
    runtime: docker
    plan: starter # private-network capable, never sleeps, SMTP allowed
    branch: main
    dockerfilePath: ./services/identity-service/Dockerfile
    dockerContext: ./services/identity-service
    healthCheckPath: /health
    envVars:
      - fromGroup: civicos-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: civicos-postgres
          property: connectionString
      - key: APP_URL
        # The citizen web custom domain — used in the body of
        # verification emails.
        value: https://civicos.ng

  # ── Community service ──────────────────────────────────────────────
  # Communities, issues, petitions, representatives, comments,
  # notifications, content flags.
  # NOTE: persistent disk removed for free-tier deploy — uploads will
  # not survive service restarts. Re-add the `disk:` block before
  # taking real citizen traffic:
  #     disk:
  #       name: uploads
  #       mountPath: /data
  #       sizeGB: 10
  - type: web
    name: civicos-community
    runtime: docker
    plan: starter # private-network capable, never sleeps, SMTP allowed
    branch: main
    dockerfilePath: ./services/community-service/Dockerfile
    dockerContext: ./services/community-service
    healthCheckPath: /health
    envVars:
      - fromGroup: civicos-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: civicos-postgres
          property: connectionString

  # ── Organization service ───────────────────────────────────────────
  # Organizations, members, announcements, projects, assignments,
  # progress updates, verified-badge control.
  - type: web
    name: civicos-organization
    runtime: docker
    plan: starter # private-network capable, never sleeps, SMTP allowed
    branch: main
    dockerfilePath: ./services/organization-service/Dockerfile
    dockerContext: ./services/organization-service
    healthCheckPath: /health
    envVars:
      - fromGroup: civicos-secrets
      - key: DATABASE_URL
        fromDatabase:
          name: civicos-postgres
          property: connectionString

  # ── Citizen web (static site) ──────────────────────────────────────
  # Built by turbo which builds shared packages first, then the app.
  # SPA rewrites all unmatched paths to index.html so React Router
  # handles /issues, /petitions, etc.
  - type: web
    name: civicos-web
    runtime: static
    branch: main
    # `corepack pnpm` runs the packageManager-pinned pnpm (9.4.0) without
    # `corepack enable`, which fails on Render's read-only /usr/bin.
    # COREPACK_ENABLE_DOWNLOAD_PROMPT=0 skips the interactive download
    # confirmation, which would hang a non-TTY CI build.
    buildCommand: export COREPACK_ENABLE_DOWNLOAD_PROMPT=0 && corepack pnpm install --frozen-lockfile && corepack pnpm --filter @civicos/web... build
    staticPublishPath: ./apps/web/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        # The gateway's public URL, pinned (see note on the gateway's
        # *_SERVICE_URL vars).
        value: https://civicos-gateway-8slr.onrender.com
      - key: HUSKY
        value: '0' # skip Husky's git-hooks step during the CI install

  # ── Admin console (static site) ────────────────────────────────────
  - type: web
    name: civicos-admin
    runtime: static
    branch: main
    buildCommand: export COREPACK_ENABLE_DOWNLOAD_PROMPT=0 && corepack pnpm install --frozen-lockfile && corepack pnpm --filter @civicos/admin... build
    staticPublishPath: ./apps/admin/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://civicos-gateway-8slr.onrender.com
      - key: HUSKY
        value: '0'
